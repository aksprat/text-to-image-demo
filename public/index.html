<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PhotoSnap AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="ambient ambient-a"></div>
    <div class="ambient ambient-b"></div>

    <main class="app-shell">
      <header class="hero">
        <p class="eyebrow">DigitalOcean + Fal.ai</p>
        <h1>PhotoSnap AI</h1>
        <p class="subhead">Turn ideas into striking visuals in seconds.</p>
      </header>

      <section class="panel">
        <form id="generate-form">
          <label for="prompt">Prompt</label>
          <textarea
            id="prompt"
            name="prompt"
            rows="4"
            placeholder="Cinematic portrait of a cyclist in neon rain, 35mm film look"
            required
          ></textarea>

          <div class="field-row">
            <div class="field">
              <label for="image-size">Image size</label>
              <select id="image-size" name="image_size">
                <option value="square_hd">Square HD</option>
                <option value="landscape_4_3" selected>Landscape 4:3</option>
                <option value="portrait_4_3">Portrait 4:3</option>
                <option value="landscape_16_9">Landscape 16:9</option>
                <option value="portrait_16_9">Portrait 16:9</option>
              </select>
            </div>

            <div class="field">
              <label for="negative-prompt">Negative prompt (optional)</label>
              <input
                id="negative-prompt"
                name="negative_prompt"
                type="text"
                placeholder="blurry, low quality, artifacts"
              />
            </div>
          </div>

          <button id="generate-btn" type="submit">Generate Image</button>
        </form>
      </section>

      <section class="panel result-panel" id="result-panel" aria-live="polite">
        <p class="status" id="status">Your generated image will appear here.</p>

        <figure class="image-frame" id="image-frame" hidden>
          <img id="result-image" alt="Generated output" />
        </figure>

        <div class="actions" id="actions" hidden>
          <button id="download-btn" class="secondary" type="button">Download</button>
          <button id="save-btn" type="button">Save To Spaces</button>
        </div>

        <p class="save-result" id="save-result"></p>
      </section>
    </main>

    <script src="app.js" type="module"></script>
  </body>
</html>
